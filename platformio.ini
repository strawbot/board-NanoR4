; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nano_r4]
upload_protocol = dfu
platform = renesas-ra
board = nano_r4
; NOTE: framework = fsp intentionally disabled — the bundled framework-renesas-fsp
; package lags behind our RASC-generated FSP 6.2.0. We compile the local ra/
; tree (including CMSIS, startup.c, system.c) so versions stay aligned.
;
; PIO defaults to gcc-arm-none-eabi 7.2.1 which is too old for FSP 6.2's
; linker script (rejects "ALIGN(.,512)" before the colon). Pin a modern one.
platform_packages =
    toolchain-gccarmnoneeabi @ ~1.120301.0

; TimbreOS is a flat folder of .c/.h files (no library.json / src/ layout), so
; lib_extra_dirs can't auto-discover it. Pull its sources in directly below
; and rely on the -I ../TimbreOS flag for headers.
;
; Excluded TimbreOS sources:
;   - printersHost.c : host-side output only, not for embedded build
;
; gpio_dump.c is still STM32-only and excluded.
; ra_gen/main.c is the generated `int main(void) { hal_entry(); }` shim that
; satisfies startup.c's Reset_Handler — keep it in the build.
; mocks.c is portable and supplies system_failure / output / show_cli.
build_src_filter =
    +<*>
    +<../Board/**/*>
    -<../Board/gpio_dump.c>
    +<../Limbs/*.c>
    +<../../TimbreOS/*.c>
    -<../../TimbreOS/printersHost.c>
    +<../ra_gen/*.c>
    +<../ra/**/*.c>
    +<../ra/**/*.S>
    -<../../TimbreOS/hash_32.c>
    -<../../TimbreOS/printersHost.c>
    -<../../TimbreOS/timestamp.c>
    -<../../TimbreOS/hash_32.c>
    -<../../TimbreOS/valueTransfer.c>
    +<../../Robot/diagnostics/canary/*.c>
    +<../../Robot/io/ad5593r/*.c>
    ; TinyUSB — core + DFU Runtime class + Renesas RUSB2 device driver
    +<../../tinyusb/src/tusb.c>
    +<../../tinyusb/src/common/tusb_fifo.c>
    +<../../tinyusb/src/device/usbd.c>
    +<../../tinyusb/src/device/usbd_control.c>
    +<../../tinyusb/src/class/dfu/dfu_rt_device.c>
    +<../../tinyusb/src/portable/renesas/rusb2/dcd_rusb2.c>
    +<../../tinyusb/src/portable/renesas/rusb2/rusb2_common.c>

; Include paths and macros mirror RASC's buildinfo.json.
build_flags =
    -I .
    -I Board
    -I Board/include
    -I ../TimbreOS
    -I ra_gen
    -I ra_cfg/fsp_cfg
    -I ra_cfg/fsp_cfg/bsp
    -I ra/arm/CMSIS_6/CMSIS/Core/Include
    -I ra/fsp/inc
    -I ra/fsp/inc/api
    -I ra/fsp/inc/instances
    -I ../Robot/diagnostics/canary
    -I ../Robot/io/ad5593r
    -I ../tinyusb/src
    -D_RA_CORE=CM4
    -D_RA_ORDINAL=1
    -D_RENESAS_RA_
    --specs=nosys.specs
    --specs=nano.specs   ; optional — pulls in the size-optimized "newlib-nano" too

; RASC-provided linker script — defines memory regions for the RA4M1.
board_build.ldscript = script/fsp.ld
extra_scripts =
    pre:Scripts/gen_build_timestamp.py
    pre:Scripts/run_parsewords.py
    post:Scripts/report_memory.py
; Pre-build scripts — uncomment when ready:
;     pre:Scripts/run_pin_gen.py      ; needs rewrite for RASC pin format (was STM32 CubeMX)